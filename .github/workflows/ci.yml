name: CI
on: push
env:
  DOCKER_REGISTRY: ghcr.io/sergiu-popa/
  IMAGE_NAME: mybible-api-ci-image
  PHPSTAN_CACHE_BRANCH: main
  PHPSTAN_CACHE_TMPDIR: /tmp/phpstan
  PHP_VERSION: '8.4'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  docker-build:
    name: Build image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      DOCKER_BRANCH_IMAGE: ${{ steps.expose-env-variables.outputs.DOCKER_BRANCH_IMAGE }}
    steps:
      - name: Set env variables
        id: env-variables
        run: |
          BRANCH_NAME=${{ github.ref_name }}
          GROOMED_BRANCH_NAME="${BRANCH_NAME//\//-}"
          DOCKER_MAIN_IMAGE=${{ env.DOCKER_REGISTRY }}${{ env.IMAGE_NAME }}:latest
          if [[ ${{ github.ref }} == 'refs/heads/main' ]]; \
            then DOCKER_BRANCH_IMAGE=$DOCKER_MAIN_IMAGE; \
            else DOCKER_BRANCH_IMAGE=${{ env.DOCKER_REGISTRY }}${{ env.IMAGE_NAME }}:$GROOMED_BRANCH_NAME-latest; fi
          echo "DOCKER_MAIN_IMAGE=$DOCKER_MAIN_IMAGE" >> $GITHUB_ENV
          echo "DOCKER_BRANCH_IMAGE=$DOCKER_BRANCH_IMAGE" >> $GITHUB_ENV
          echo "DOCKER_CACHE_IMAGE=$DOCKER_BRANCH_IMAGE" >> $GITHUB_ENV
      - name: Checkout project
        uses: actions/checkout@v6
      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker pull branch latest
        if: github.ref != 'refs/heads/main'
        continue-on-error: true
        run: |
          docker pull ${{ env.DOCKER_BRANCH_IMAGE }}
      - name: Docker pull main latest
        id: docker-pull-latest
        if: steps.env-variables.outcome == 'success'
        continue-on-error: true
        run: |
          docker pull ${{ env.DOCKER_MAIN_IMAGE }}
          echo "DOCKER_CACHE_IMAGE=${{ env.DOCKER_MAIN_IMAGE }}" >> $GITHUB_ENV
      - name: Docker build
        run: |
          docker build --build-arg BUILDKIT_INLINE_CACHE=1 \
            --build-arg WWWUSER=$(id -u) \
            --build-arg WWWGROUP=$(id -g) \
            -f .docker/Dockerfile \
            --target ci \
            -t ${{ env.DOCKER_BRANCH_IMAGE }} \
            --cache-from ${{ env.DOCKER_CACHE_IMAGE }} \
            --secret id=composer_auth,env=COMPOSER_AUTH \
            .
        env:
          DOCKER_BUILDKIT: 1
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
      - name: Save docker image tar
        run: |
          docker save -o /tmp/${{ env.IMAGE_NAME }}-${{ github.run_id }}.tar ${{ env.DOCKER_BRANCH_IMAGE }}
      - name: Cache docker image
        uses: actions/cache@v5
        with:
          path: /tmp/${{ env.IMAGE_NAME }}-${{ github.run_id }}.tar
          key: ${{ env.IMAGE_NAME }}-${{ github.run_id }}
      - name: Expose env variables between jobs
        id: expose-env-variables
        run: |
          echo "DOCKER_BRANCH_IMAGE=${{ env.DOCKER_BRANCH_IMAGE }}" >> $GITHUB_OUTPUT

  lint:
    name: Code style
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
      - name: Run lint
        run: composer lint

  stan:
    name: Static analysis
    runs-on: ubuntu-latest
    needs: [docker-build, lint]
    timeout-minutes: 15
    steps:
      - name: Consume env variables
        run: |
          echo "DOCKER_BRANCH_IMAGE=${{ needs.docker-build.outputs.DOCKER_BRANCH_IMAGE }}" >> $GITHUB_ENV
      - name: Fetch docker image
        uses: actions/cache@v5
        with:
          path: /tmp/${{ env.IMAGE_NAME }}-${{ github.run_id }}.tar
          key: ${{ env.IMAGE_NAME }}-${{ github.run_id }}
      - name: Load docker image
        run: |
          docker load -i /tmp/${{ env.IMAGE_NAME }}-${{ github.run_id }}.tar
      - name: Restore PHPStan cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.PHPSTAN_CACHE_TMPDIR }}/resultCache.php
          key: phpstan-cache-${{ env.PHPSTAN_CACHE_BRANCH }}-${{ github.run_id }}
          restore-keys: |
            phpstan-cache-${{ env.PHPSTAN_CACHE_BRANCH }}
      - name: Run static analysis
        run: |
          mkdir -p ${{ env.PHPSTAN_CACHE_TMPDIR }}
          docker run \
            -v ${{ env.PHPSTAN_CACHE_TMPDIR }}:${{ env.PHPSTAN_CACHE_TMPDIR }} \
            --entrypoint composer ${{ env.DOCKER_BRANCH_IMAGE }} \
            stan
      - if: ${{ github.ref_name == env.PHPSTAN_CACHE_BRANCH }}
        name: Save PHPStan cache
        uses: actions/cache/save@v5
        with:
          path: ${{ env.PHPSTAN_CACHE_TMPDIR }}/resultCache.php
          key: phpstan-cache-${{ env.PHPSTAN_CACHE_BRANCH }}

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [docker-build, lint]
    timeout-minutes: 25
    env:
      DB_HOST: mysql
      REDIS_HOST: redis
      DB_DATABASE: laravel
      DB_USERNAME: root
      DB_PASSWORD: secret
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: false
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: laravel
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Consume env variables
        run: |
          echo "DOCKER_BRANCH_IMAGE=${{ needs.docker-build.outputs.DOCKER_BRANCH_IMAGE }}" >> $GITHUB_ENV
      - name: Fetch docker image
        uses: actions/cache@v5
        with:
          path: /tmp/${{ env.IMAGE_NAME }}-${{ github.run_id }}.tar
          key: ${{ env.IMAGE_NAME }}-${{ github.run_id }}
      - name: Load docker image
        run: |
          docker load -i /tmp/${{ env.IMAGE_NAME }}-${{ github.run_id }}.tar
      - name: Resolve services network
        run: |
          SERVICE_NETWORK=$(docker inspect ${{ job.services.mysql.id }} --format '{{ range $k, $v := .NetworkSettings.Networks }}{{ println $k }}{{ end }}' | sed -n '1p')
          echo "JOB_DOCKER_NETWORK=$SERVICE_NETWORK" >> $GITHUB_ENV
      - name: Migrate the database
        run: |
          docker run \
            -e REDIS_HOST \
            -e DB_HOST \
            -e DB_DATABASE \
            -e DB_USERNAME \
            -e DB_PASSWORD \
            --network $JOB_DOCKER_NETWORK \
            --entrypoint php \
            ${{ env.DOCKER_BRANCH_IMAGE }} \
            artisan migrate
      - name: Run tests with coverage
        run: |
          docker run \
            -e REDIS_HOST \
            -e DB_HOST \
            -e DB_DATABASE \
            -e DB_USERNAME \
            -e DB_PASSWORD \
            --network $JOB_DOCKER_NETWORK \
            --entrypoint php \
            ${{ env.DOCKER_BRANCH_IMAGE }} \
            artisan test --coverage --min=80

  docker-push:
    name: Docker push
    runs-on: ubuntu-latest
    needs: [docker-build, test, lint, stan]
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Consume env variables
        run: |
          echo "DOCKER_BRANCH_IMAGE=${{ needs.docker-build.outputs.DOCKER_BRANCH_IMAGE }}" >> $GITHUB_ENV
      - name: Fetch docker image
        uses: actions/cache@v5
        with:
          path: /tmp/${{ env.IMAGE_NAME }}-${{ github.run_id }}.tar
          key: ${{ env.IMAGE_NAME }}-${{ github.run_id }}
      - name: Load docker image
        run: |
          docker load -i /tmp/${{ env.IMAGE_NAME }}-${{ github.run_id }}.tar
      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push docker image
        run: |
          docker push ${{ env.DOCKER_BRANCH_IMAGE }}

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [docker-push]
    if: always()
    timeout-minutes: 15
    steps:
      - name: Delete cache
        uses: actions/github-script@v8
        continue-on-error: true
        with:
          script: |
            github.rest.actions.deleteActionsCacheByKey({
              owner: context.repo.owner,
              repo: context.repo.repo,
              key: '${{ env.IMAGE_NAME }}-${{ github.run_id }}',
            })
