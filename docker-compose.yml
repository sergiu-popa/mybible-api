services:
  traefik:
    image: traefik:v2.11
    container_name: 'mybible-api-traefik'
    ports:
      - '80:80'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - '--api.insecure=true'
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--entrypoints.web.address=:80'
    networks:
      - mybible-api

  mysql:
    container_name: 'mybible-api-mysql'
    image: 'mysql:8.0'
    ports:
      - '3306:3306'
    environment:
      MYSQL_DATABASE: '${DB_DATABASE:-laravel}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-secret}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - 'mybible-api-mysql:/var/lib/mysql'
    networks:
      - mybible-api
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-psecret"]
      retries: 3
      timeout: 5s

  redis:
    container_name: 'mybible-api-redis'
    image: 'redis:alpine'
    ports:
      - '6379:6379'
    volumes:
      - 'mybible-api-redis:/data'
    networks:
      - mybible-api
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

  app:
    container_name: 'mybible-api-app'
    image: mybible-api-app
    entrypoint: ['/app/entrypoint.sh']
    command: ["web"]
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: development
      args:
        WWWGROUP: '${WWWGROUP}'
        WWWUSER: '${WWWUSER}'
    depends_on:
      - traefik
      - mysql
      - test-mysql
      - redis
      - test-redis
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '8080:8080'
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`mybible-api.localhost`)
      - traefik.http.routers.web.entrypoints=web
      - traefik.http.services.web.loadbalancer.server.port=8080
    environment:
      WWWUSER: '${WWWUSER}'
      COMPOSER_HOME: '/tmp/.composer'
      XDEBUG_MODE: '${XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${XDEBUG_CONFIG:-client_host=host.docker.internal}'
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: '1'
    volumes:
      - '.:/var/www'
    networks:
      - mybible-api

  worker:
    container_name: 'mybible-api-worker'
    image: mybible-api-app
    entrypoint: ['/app/entrypoint.sh']
    command: ["worker"]
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: development
      args:
        WWWGROUP: '${WWWGROUP}'
        WWWUSER: '${WWWUSER}'
    depends_on:
      - app
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      WWWUSER: '${WWWUSER}'
      COMPOSER_HOME: '/tmp/.composer'
      XDEBUG_MODE: '${XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${XDEBUG_CONFIG:-client_host=host.docker.internal}'
      PHP_OPCACHE_VALIDATE_TIMESTAMPS: '1'
    volumes:
      - '.:/var/www'
    networks:
      - mybible-api

  test-mysql:
    container_name: 'mybible-api-test-mysql'
    image: 'mysql:8.0'
    tmpfs: /var/lib/mysql
    ports:
      - '3307:3306'
    environment:
      MYSQL_DATABASE: '${DB_DATABASE:-laravel}'
      MYSQL_ROOT_HOST: '%'
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-secret}'
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    networks:
      - mybible-api
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-psecret"]
      retries: 3
      timeout: 5s

  test-redis:
    container_name: 'mybible-api-test-redis'
    image: 'redis:alpine'
    ports:
      - '6381:6379'
    networks:
      - mybible-api
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      retries: 3
      timeout: 5s

networks:
  mybible-api:
    name: mybible-api
    driver: bridge

volumes:
  mybible-api-mysql:
    driver: local
  mybible-api-redis:
    driver: local
